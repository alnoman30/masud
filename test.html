<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Accordion Test</title>

<style>
body {
  font-family: Arial;
  padding: 40px;
}

.spec-item {
  border-bottom: 1px solid #ddd;
  cursor: pointer;
}

.spec-header {
  display: flex;
  justify-content: space-between;
  padding: 20px 0;
}

.spec-content {
  height: 0;
  overflow: hidden;
  opacity: 0;
  transition: all 0.4s ease;
}

.spec-item.active .spec-content {
  height: 100px; /* fixed height for test */
  opacity: 1;
}

.spec-item.active h3 {
  color: red;
}
</style>

</head>
<body>

<div class="spec-item">
  <div class="spec-header">
    <h3>Item 1</h3>
    <span>⌄</span>
  </div>
  <div class="spec-content">
    <p>HELLO THIS SHOULD SHOW</p>
    <button>Click me</button>
  </div>
</div>

<div class="spec-item">
  <div class="spec-header">
    <h3>Item 2</h3>
    <span>⌄</span>
  </div>
  <div class="spec-content">
    <p>SECOND CONTENT</p>
    <button>Click me</button>
  </div>
</div>

<script>
document.querySelectorAll('.spec-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.spec-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
  });
});
</script>

</body>
</html>
